# Configuration for the L1-m6A-polyA Snakemake pipeline
# Edit paths below to match your local environment.

samples:
  - A549_4_1
  - A549_5_1
  - A549_6_1
  - H9_2_1
  - H9_2_2
  - H9_3_1
  - H9_3_2
  - H9_4_1
  - H9_4_2
  - Hct116_3_1
  - Hct116_3_4
  - Hct116_4_3
  - Hek293T_3_1
  - Hek293T_4_1
  - Hek293_1_1
  - HeLa_1_1
  - HeLa_2_1
  - HeLa_3_1
  - HeLa-Ars_1_1
  - HeLa-Ars_2_1
  - HeLa-Ars_3_1
  - HepG2_5_1
  - HepG2_5_2
  - HepG2_6_1
  - HEYA8_1_1
  - HEYA8_1_2
  - HEYA8_2_1
  - HEYA8_2_2
  - HEYA8_3_1
  - K562_4_1
  - K562_5_1
  - K562_6_1
  - MCF7_2_3
  - MCF7_3_1
  - MCF7_4_1
  - MCF7-EV_1_1
  - SHSY5Y_1_1
  - SHSY5Y_2_1
  - SHSY5Y_3_1

samples_basecall_group: {}
output_dir: results
group_output_dir: results_group
fastq_dir: /path/to/data/fastq
fast5_dir: /path/to/data/fast5
pod5_dir: /path/to/data/pod5
l1_fast5_dir: /path/to/scratch/l1_fast5
l1_basecall_dir: l1_basecall
l1_guppy_save_dir: /path/to/scratch/l1_guppy/{group}
l1_fast5_env: fast5_pod5
l1_fast5_pythonpath: ""
l1_fast5_threads: 8
python_env: research
guppy_bin: /path/to/ont-guppy/bin/guppy_basecaller
guppy_config: /path/to/ont-guppy/data/rna_r9.4.1_70bps_hac.cfg
guppy_gpus: 2
guppy_device: cuda:0,1
guppy_threads: 40
longreadsum_cmd: "conda run -n longreadsum longreadsum"
samtools_cmd: "conda run -n research --no-capture-output samtools"
seqtk_cmd: "conda run -n research seqtk"
repeatmasker_cmd: /path/to/RepeatMasker/RepeatMasker
module_loads:
  - minimap2/2.28
  - bedtools/2.31.0
resources:
  gpus: 0
  time: "24:00:00"
  gpu_type: ""
  slurm_opts: "--output=/dev/null --error=/dev/null"
ref_genome38: /path/to/reference/Human.fasta
ref_splice: /path/to/reference/junctions.bed
ref_line: /path/to/reference/custom_LINE_reference.fasta
nanopolish_threads: 20
ninetails_threads: 40
ninetails_env: ninetails
ninetails_tf_env: /path/to/conda/envs/ninetails-tf
ninetails_port_range: 11000:11999
ninetails_basecall_group: Basecall_1D_000
l1_3prime_window: 200
